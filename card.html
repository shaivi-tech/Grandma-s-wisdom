<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rasa Narratives - Choose Your Remedy</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'ivory': '#fffff0',
                        'deep-rust': '#9e4611',
                        'mystic-blue': '#1c1c2e',
                    },
                    fontFamily: {
                        serif: ['"Playfair Display"', 'serif'],
                        sans: ['Montserrat', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <style>
        body {
            background-color: #fffff0;
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            color: #1c1c2e;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .perspective-1000 {
            perspective: 1000px;
        }

        .preserve-3d {
            transform-style: preserve-3d;
        }

        .font-size-remedy {
            font-size: clamp(48px, 10vw, 98px);
            line-height: 1;
            font-family: 'Playfair Display', serif;
        }

        .font-size-tap {
            font-size: clamp(14px, 2.5vw, 24px);
        }

        .stitch-card-pattern {
            background-image: url("images/garden_remedy.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .card {
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.5s ease;
            cursor: pointer;
            position: absolute;
            width: 176px;
            /* w-44 */
            height: 288px;
            /* h-72 */
            margin-left: -88px;
            margin-top: -144px;
            transform-origin: center center;
            will-change: transform, opacity;
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            background: rgba(28, 28, 46, 0.98);
            backdrop-filter: blur(12px);
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background-color: #fffff0;
            border-radius: 2rem;
            max-width: 60rem;
            width: 100%;
            max-height: 90vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 240, 0.1);
            animation: modalIn 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(30px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        @media (min-width: 768px) {
            .modal-content {
                flex-direction: row;
            }
        }

        .vine-path {
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: drawVine 3s forwards ease-in-out;
        }

        @keyframes drawVine {
            to {
                stroke-dashoffset: 0;
            }
        }
    </style>
</head>

<body class="selection:bg-deep-rust selection:text-ivory">

    <div class="min-h-screen flex flex-col items-center justify-between py-12 px-4 relative overflow-hidden">
        <!-- Header -->
        <header class="text-center max-w-5xl space-y-8 mb-4 relative z-10">
            <h1 class="font-size-remedy text-mystic-blue tracking-tight font-medium"
                style="opacity: 0; transform: translateY(-20px); transition: opacity 0.8s, transform 0.8s;"
                id="main-title">
                Choose Your Remedy
            </h1>
            <p class="font-size-tap text-mystic-blue/30 font-medium tracking-widest max-w-4xl mx-auto uppercase italic"
                style="opacity: 0; transition: opacity 1s 0.3s;" id="main-subtitle">
                Tap to find what secret recipe is in store for you
            </p>
        </header>

        <!-- Card Arena -->
        <div id="card-arena"
            class="relative w-full max-w-5xl h-[550px] flex items-center justify-center perspective-1000 mt-12 mb-20">
            <!-- Cards will be injected here by JavaScript -->
        </div>

        <!-- Controls -->
        <footer class="mt-8 z-20">
            <button id="shuffle-btn"
                class="group relative flex items-center justify-center gap-3 px-10 py-4 bg-mystic-blue/5 backdrop-blur-sm text-mystic-blue/50 rounded-full transition-all hover:bg-mystic-blue/15 hover:text-mystic-blue active:scale-95 border border-mystic-blue/5">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="shuffle-icon transition-transform duration-1000">
                    <polyline points="16 3 21 3 21 8"></polyline>
                    <line x1="4" y1="20" x2="21" y2="3"></line>
                    <polyline points="21 16 21 21 16 21"></polyline>
                    <line x1="15" y1="15" x2="21" y2="21"></line>
                    <line x1="4" y1="4" x2="9" y2="9"></line>
                </svg>
                <span class="font-serif text-xl tracking-widest uppercase italic">Shuffle the Yard</span>
            </button>
        </footer>
    </div>

    <!-- Modal -->
    <div id="modal" class="modal">
        <div id="modal-content-container" class="modal-content">
            <!-- Modal content injected by JS -->
        </div>
    </div>

    <script>
        const RASAS = [
            { id: 1, name: "Shringara", artifact: "Celestial Silk Weave", meaning: "Erotic & Aesthetic Love", description: "A tapestry of blooming lotuses woven with threads of moonstone and rose heart, representing the attraction of souls.", color: "bg-rose-900" },
            { id: 2, name: "Hasya", artifact: "Joyous Parrot Muslin", meaning: "Humor & Laughter", description: "Vibrant yellow cotton adorned with mimicry of parrots, capturing the lightness of a heart in mirth.", color: "bg-yellow-600" },
            { id: 3, name: "Karuna", artifact: "Weeping Willow Wool", meaning: "Compassion & Pathos", description: "Indigo blue wool that feels like a cool touch on a fevered brow, embodying shared sorrow and mercy.", color: "bg-blue-900" },
            { id: 4, name: "Raudra", artifact: "Flame-Ikat Silk", meaning: "Fury & Anger", description: "Tangled crimson patterns that seem to flicker, representing the righteous fire of destruction and change.", color: "bg-red-950" },
            { id: 5, name: "Veera", artifact: "Saffron Banner Brocade", meaning: "Heroism & Courage", description: "Sturdy gold-thread brocade depicting the rising sun, symbolizing the unwavering spirit of the warrior.", color: "bg-orange-800" },
            { id: 6, name: "Bhayanaka", artifact: "Shadow-Work Indigo", meaning: "Fear & Terror", description: "Layers of midnight dye creating depths where the eye sees only silhouettes of what it dreads most.", color: "bg-slate-950" },
            { id: 7, name: "Bibhatsa", artifact: "Ash-Crusted Linen", meaning: "Disgust & Aversion", description: "A rough, textured weave in shades of decay, reminding us that all material form eventually fades.", color: "bg-zinc-800" },
            { id: 8, name: "Adbhuta", artifact: "Iridescent Naga Silk", meaning: "Wonder & Surprise", description: "Fabric that shifts colors like a serpent's scales, reflecting the awe of the miraculous and unknown.", color: "bg-emerald-900" },
            { id: 9, name: "Shanta", artifact: "Sacred White Canvas", meaning: "Peace & Tranquility", description: "The silent white of an unruffled lake, the void where all emotions reconcile into stillness.", color: "bg-stone-100" },
            { id: 10, name: "Bhakti", artifact: "Temple Velvet", meaning: "Devotion & Surrender", description: "Deep emerald velvet scented with sandalwood, representing the total immersion of the self in the divine.", color: "bg-green-950" },
            { id: 11, name: "Vatsalya", artifact: "Lotus-Petal Chiffon", meaning: "Parental Love", description: "Delicate pink layers as soft as a newborn's breath, embodying the nurturing warmth of unconditional care.", color: "bg-pink-300" },
            { id: 12, name: "Vairagya", artifact: "Nomad Jute", meaning: "Detachment", description: "Earthy, unrefined fiber that holds no stains, representing the liberation found in letting go of desires.", color: "bg-amber-950" },
        ];

        // SVGs as strings for reuse
        const FLOWER_SVG = `
            <svg viewBox="0 0 100 100" class="w-16 h-16 text-[#9e4611] transition-transform duration-700">
                <path d="M50 50 Q30 20 50 10 Q70 20 50 50" fill="currentColor" opacity="0.6" />
                <path d="M50 50 Q10 40 5 60 Q20 70 50 50" fill="currentColor" opacity="0.4" />
                <path d="M50 50 Q90 40 95 60 Q80 70 50 50" fill="currentColor" opacity="0.4" />
                <path d="M50 50 Q20 80 40 95 Q60 85 50 50" fill="currentColor" opacity="0.5" />
                <path d="M50 50 Q80 80 60 95 Q40 85 50 50" fill="currentColor" opacity="0.5" />
                <circle cx="50" cy="50" r="8" fill="#d4af37" opacity="0.8" />
            </svg>`;

        const VINE_SVG = `
            <svg viewBox="0 0 176 288" class="absolute inset-0 w-full h-full pointer-events-none z-0">
                <path d="M20 260 Q 30 220, 15 180 T 40 120" fill="none" stroke="#d4af37" stroke-width="0.5" class="vine-path" opacity="0.3" />
                <path d="M156 260 Q 146 220, 161 180 T 136 120" fill="none" stroke="#d4af37" stroke-width="0.5" class="vine-path" opacity="0.3" />
                <path d="M20 40 Q 50 20, 88 35 T 156 40" fill="none" stroke="#d4af37" stroke-width="0.5" class="vine-path" opacity="0.2" />
            </svg>`;

        let currentCards = [...RASAS];
        const cardArena = document.getElementById('card-arena');
        const shuffleBtn = document.getElementById('shuffle-btn');
        const modal = document.getElementById('modal');
        const modalContent = document.getElementById('modal-content-container');

        function renderCards(animate = false) {
            cardArena.innerHTML = '';
            currentCards.forEach((rasa, index) => {
                const total = currentCards.length;
                const angleStep = 160 / (total - 1);
                const startAngle = -80;
                const angle = startAngle + (index * angleStep);
                const radius = 400;

                const x = Math.sin((angle * Math.PI) / 180) * radius;
                const y = -Math.cos((angle * Math.PI) / 180) * radius + radius - 150;

                const cardEl = document.createElement('div');
                cardEl.className = 'card group';
                cardEl.id = `card-${rasa.id}`;

                // Initial hidden state for entry animation
                if (animate) {
                    cardEl.style.opacity = '0';
                    cardEl.style.transform = `translate(${x}px, ${y}px) rotate(${angle}deg) scale(0)`;
                } else {
                    cardEl.style.transform = `translate(${x}px, ${y}px) rotate(${angle}deg)`;
                }

                cardEl.style.zIndex = index;

                cardEl.innerHTML = `
                    <div class="w-full h-full rounded-2xl overflow-hidden border-[6px] border-[#fde7f3] shadow-[0_20px_50px_rgba(0,0,0,0.4)] relative stitch-card-pattern">
                        ${VINE_SVG}
                        <div class="absolute inset-2 border border-[#d4af37]/20 rounded-2xl pointer-events-none"></div>
                        <div class="absolute inset-0 flex items-center justify-center">
                            <div class="relative z-10 flex flex-col items-center">
                                ${FLOWER_SVG}
                                <div class="mt-6 text-[10px] uppercase tracking-[0.6em] text-[#d4af37] font-bold font-sans">Vessel ${rasa.id}</div>
                            </div>
                        </div>
                        <div class="absolute top-4 left-4 opacity-40 group-hover:rotate-45 transition-transform duration-1000">
                             <svg class="text-[#d4af37]" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8a13 13 0 0 1-10 10Z"></path><path d="M9 21c0-4.5 3.5-7 3.5-7"></path></svg>
                        </div>
                        <div class="absolute bottom-4 right-4 opacity-40 group-hover:rotate-45 transition-transform duration-1000">
                             <svg class="text-[#d4af37]" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8a13 13 0 0 1-10 10Z"></path><path d="M9 21c0-4.5 3.5-7 3.5-7"></path></svg>
                        </div>
                        <div class="absolute inset-0 bg-gradient-to-tr from-white/5 to-transparent opacity-0 group-hover:opacity-20 transition-opacity duration-500"></div>
                    </div>
                `;

                cardEl.addEventListener('mouseenter', () => {
                    cardEl.style.transform = `translate(${x}px, ${y - 45}px) rotate(${angle}deg) scale(1.08)`;
                });

                cardEl.addEventListener('mouseleave', () => {
                    cardEl.style.transform = `translate(${x}px, ${y}px) rotate(${angle}deg) scale(1)`;
                });

                cardEl.addEventListener('click', () => showModal(rasa));

                cardArena.appendChild(cardEl);

                // Trigger entry animation
                if (animate) {
                    setTimeout(() => {
                        cardEl.style.opacity = '1';
                        cardEl.style.transform = `translate(${x}px, ${y}px) rotate(${angle}deg) scale(1)`;
                    }, index * 40);
                }
            });
        }

        function showModal(rasa) {
            modalContent.innerHTML = `
                <div class="w-full md:w-2/5 h-80 md:h-auto ${rasa.color} p-12 flex items-center justify-center relative overflow-hidden">
                    <div class="absolute inset-0 opacity-40 mix-blend-overlay stitch-card-pattern"></div>
                    ${VINE_SVG}
                    <div class="absolute inset-8 border-2 border-ivory/20 rounded-t-full rounded-b-lg"></div>
                    <div class="relative z-10 text-center space-y-6">
                        <div class="scale-150 mb-8 opacity-80 filter drop-shadow-xl text-white">
                             ${FLOWER_SVG.replace('w-16 h-16', 'w-24 h-24')}
                        </div>
                        <div class="space-y-2">
                            <h3 class="text-ivory text-xl font-sans tracking-[0.3em] uppercase opacity-60">The Vessel</h3>
                            <h3 class="text-ivory text-4xl font-serif italic">${rasa.artifact}</h3>
                        </div>
                    </div>
                </div>
                <div class="w-full md:w-3/5 p-10 md:p-16 space-y-10 overflow-y-auto relative bg-ivory">
                    <button id="close-modal" class="absolute top-8 right-8 p-3 text-mystic-blue/20 hover:text-mystic-blue transition-all hover:rotate-90">
                        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                    <div class="space-y-6">
                        <div class="flex items-center gap-6">
                            <div class="h-px flex-1 bg-deep-rust/10"></div>
                            <span class="text-deep-rust text-xs tracking-[0.6em] uppercase font-bold opacity-40">Sacred Narrative</span>
                            <div class="h-px flex-1 bg-deep-rust/10"></div>
                        </div>
                        <h2 class="text-7xl font-serif text-mystic-blue leading-tight">${rasa.name}</h2>
                        <p class="text-3xl text-mystic-blue/90 italic font-serif leading-relaxed px-8 py-6 bg-deep-rust/5 border-l-[6px] border-deep-rust rounded-r-xl">
                            "${rasa.meaning}"
                        </p>
                    </div>
                    <p class="text-mystic-blue/60 leading-relaxed text-2xl font-light font-sans max-w-prose">
                        ${rasa.description}
                    </p>
                    <button id="return-btn" class="w-full py-6 bg-mystic-blue text-ivory font-serif text-2xl italic tracking-widest rounded-2xl hover:bg-deep-rust transition-all active:scale-95 shadow-2xl hover:shadow-deep-rust/20">
                        Return to the Courtyard
                    </button>
                </div>
            `;
            modal.classList.add('active');

            document.getElementById('close-modal').onclick = closeModal;
            document.getElementById('return-btn').onclick = closeModal;
        }

        function closeModal() {
            modal.style.opacity = '0';
            modal.querySelector('.modal-content').style.transform = 'scale(0.95) translateY(20px)';
            setTimeout(() => {
                modal.classList.remove('active');
                modal.style.opacity = '1';
                modal.querySelector('.modal-content').style.transform = '';
            }, 300);
        }

        shuffleBtn.addEventListener('click', () => {
            const icon = shuffleBtn.querySelector('.shuffle-icon');
            icon.style.transform = 'rotate(360deg)';

            // Exit animation
            const allCards = document.querySelectorAll('.card');
            allCards.forEach((c, i) => {
                c.style.transform = 'translate(0, 400px) rotate(0) scale(0)';
                c.style.opacity = '0';
            });

            setTimeout(() => {
                currentCards.sort(() => Math.random() - 0.5);
                renderCards(true);
                icon.style.transform = '';
            }, 800);
        });

        // Initialize with delay for smooth load
        window.addEventListener('load', () => {
            document.getElementById('main-title').style.opacity = '1';
            document.getElementById('main-title').style.transform = 'translateY(0)';
            document.getElementById('main-subtitle').style.opacity = '1';
            renderCards(true);
        });

        // Close on backdrop/escape
        modal.onclick = (e) => { if (e.target == modal) closeModal(); }
        window.onkeydown = (e) => { if (e.key === 'Escape') closeModal(); }

    </script>
</body>

</html>
