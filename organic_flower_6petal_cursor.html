
<h2 class="sr-only">6 petal organic flower cursor with leaf trail</h2>
<div id="demo" style="position:relative;width:100%;height:420px;background:#f7f2e4;border-radius:12px;overflow:hidden;cursor:none;border:1px solid rgba(139,94,42,0.12);">
  <canvas id="c" style="position:absolute;inset:0;pointer-events:none;"></canvas>

  <div id="cur" style="position:absolute;pointer-events:none;transform:translate(-50%,-50%);">
    <svg width="30" height="30" viewBox="0 0 30 30">
      <!-- 6 organic uneven petals at 60deg intervals with slight size variation -->
      <path d="M15 14 C13 9 11 4 15 2 C19 4 17 9 15 14Z" fill="#c1440e" opacity="0.9"/>
      <path d="M15 14 C13 9 11 4 15 2 C19 4 17 9 15 14Z" fill="#c44a1a" opacity="0.86" transform="rotate(60,15,15)"/>
      <path d="M15 14 C12.5 9 11 4.5 15 2.5 C18.5 4 17.5 9 15 14Z" fill="#b83a10" opacity="0.88" transform="rotate(120,15,15)"/>
      <path d="M15 14 C13 9.5 11.5 5 15 3 C18.5 4.5 17 9.5 15 14Z" fill="#c1440e" opacity="0.9" transform="rotate(180,15,15)"/>
      <path d="M15 14 C13.5 9 11 4 15 2 C19 4.5 17 9 15 14Z" fill="#c44a1a" opacity="0.84" transform="rotate(240,15,15)"/>
      <path d="M15 14 C13 8.5 11.5 4.5 15 2.5 C18 4 17.5 9 15 14Z" fill="#b83a10" opacity="0.87" transform="rotate(300,15,15)"/>
      <!-- Off-centre golden heart for organic feel -->
      <circle cx="15" cy="15" r="5.2" fill="#f0c840"/>
      <circle cx="15.3" cy="14.8" r="3.2" fill="#e8a820"/>
      <!-- Pollen dots -->
      <circle cx="13.2" cy="13.5" r="0.7" fill="#c8780a" opacity="0.65"/>
      <circle cx="16.8" cy="13.5" r="0.7" fill="#c8780a" opacity="0.65"/>
      <circle cx="15" cy="17"   r="0.7" fill="#c8780a" opacity="0.6"/>
      <circle cx="13" cy="16"   r="0.55" fill="#c8780a" opacity="0.5"/>
      <circle cx="17" cy="16"   r="0.55" fill="#c8780a" opacity="0.5"/>
      <circle cx="15" cy="13"   r="0.55" fill="#c8780a" opacity="0.5"/>
    </svg>
  </div>

  <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;gap:10px;">
    <p style="font-family:Georgia,serif;font-size:20px;font-style:italic;color:#2d1a08;margin:0;opacity:0.65;">move slowly</p>
    <p style="font-family:Georgia,serif;font-size:11px;color:#8b5e2a;margin:0;font-style:italic;opacity:0.4;">she never called it medicine</p>
  </div>
</div>

<script>
const demo   = document.getElementById('demo');
const cur    = document.getElementById('cur');
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W, H, particles = [];
let mx = -300, my = -300, lastX = -300, lastY = -300;
let frame = 0;

function resize() {
  W = canvas.width  = demo.offsetWidth;
  H = canvas.height = demo.offsetHeight;
}
resize();

const leafCols   = ['#2d5a1a','#4a8a2a','#6aaa40','#3d7020','#5a9a30','#8fbc5a'];
const flowerCols = ['#c1440e','#d4847a','#c9a060','#e8875a','#b84020','#d4a030'];

const petalDefs = [
  { rx:0.42, ry:1.02, off:0.96 },
  { rx:0.38, ry:0.92, off:0.88 },
  { rx:0.44, ry:1.06, off:0.99 },
  { rx:0.40, ry:0.96, off:0.91 },
  { rx:0.36, ry:0.90, off:0.87 },
  { rx:0.43, ry:0.98, off:0.94 },
];

function drawOrganicFlower(x, y, s, rot, col, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(x, y);
  ctx.rotate(rot);
  petalDefs.forEach((p, i) => {
    ctx.save();
    ctx.rotate((i * 60) * Math.PI/180);
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.ellipse(0, -p.off*s, p.rx*s, p.ry*s, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  });
  ctx.fillStyle = '#f5d060';
  ctx.beginPath();
  ctx.arc(0, 0, s*0.52, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#e8a020';
  ctx.beginPath();
  ctx.arc(s*0.09, -s*0.07, s*0.30, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}

function drawLeaf(x, y, s, rot, col, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(x, y);
  ctx.rotate(rot);
  ctx.fillStyle = col;
  ctx.beginPath();
  ctx.moveTo(0, -s);
  ctx.quadraticCurveTo(s*0.55, -s*0.28, 0, s*0.55);
  ctx.quadraticCurveTo(-s*0.55, -s*0.28, 0, -s);
  ctx.fill();
  ctx.restore();
}

demo.addEventListener('mousemove', e => {
  const r = demo.getBoundingClientRect();
  mx = e.clientX - r.left;
  my = e.clientY - r.top;
  cur.style.left = mx + 'px';
  cur.style.top  = my + 'px';
});
demo.addEventListener('mouseleave', () => { mx = -300; my = -300; });

function spawn() {
  const dx = mx - lastX, dy = my - lastY;
  if (Math.sqrt(dx*dx + dy*dy) < 7) return;
  lastX = mx; lastY = my;
  const isFlower = Math.random() < 0.22;
  const col = isFlower
    ? flowerCols[Math.floor(Math.random()*flowerCols.length)]
    : leafCols[Math.floor(Math.random()*leafCols.length)];
  const angle = Math.atan2(dy, dx) + (Math.random()-0.5)*1.1 + Math.PI;
  const spd   = 0.2 + Math.random()*0.45;
  particles.push({
    x: mx+(Math.random()-0.5)*5,
    y: my+(Math.random()-0.5)*5,
    vx: Math.cos(angle)*spd,
    vy: Math.sin(angle)*spd - 0.22,
    alpha: 0.5+Math.random()*0.3,
    rot: Math.random()*Math.PI*2,
    rotV: (Math.random()-0.5)*0.06,
    size: isFlower ? (2+Math.random()*2.2) : (2.2+Math.random()*3.2),
    col, isFlower,
    gravity: 0.015,
    fade: 0.013+Math.random()*0.009,
  });
}

function loop() {
  ctx.clearRect(0,0,W,H);
  frame++;
  if (frame%2===0) spawn();
  particles = particles.filter(p => p.alpha > 0.02);
  particles.forEach(p => {
    if (p.isFlower) drawOrganicFlower(p.x,p.y,p.size,p.rot,p.col,p.alpha);
    else            drawLeaf(p.x,p.y,p.size,p.rot,p.col,p.alpha);
    p.x+=p.vx; p.y+=p.vy;
    p.vy+=p.gravity; p.vx*=0.97;
    p.rot+=p.rotV; p.alpha-=p.fade;
  });
  requestAnimationFrame(loop);
}
loop();
</script>
